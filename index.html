<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no" />
    <meta http-equiv="Feature-Policy" content="camera *; microphone *" />
    <meta http-equiv="Permissions-Policy" content="camera=*, microphone=*" />
    <title>Seepage AR Scanner</title>

    <!-- AR.js + A-Frame -->
    <script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>

    <!-- TensorFlow.js — MUST load before your model code -->
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@4.20.0/dist/tf.min.js"></script>

    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      body { overflow: hidden; background: #000; font-family: Arial, sans-serif; }

      /* ── Overlay sits above AR ── */
      #overlay {
        position: fixed; top: 0; left: 0;
        width: 100%; height: 100%;
        pointer-events: none; z-index: 999;
      }

      /* ── Status bar ── */
      #statusBar {
        position: absolute; top: 20px; left: 50%;
        transform: translateX(-50%);
        background: rgba(0,0,0,0.75);
        color: #1ab861; padding: 10px 24px;
        border-radius: 30px; font-size: 15px; font-weight: bold;
        border: 1.5px solid #1ab861; text-align: center;
        pointer-events: none; white-space: nowrap;
        max-width: 90vw; overflow: hidden; text-overflow: ellipsis;
      }

      /* ── Model loading status (below status bar) ── */
      #modelStatus {
        position: absolute; top: 72px; left: 50%;
        transform: translateX(-50%);
        background: rgba(0,0,0,0.65);
        color: #aaa; padding: 6px 18px;
        border-radius: 20px; font-size: 12px;
        pointer-events: none; text-align: center;
      }

      /* ── Scan frame corners ── */
      #scanFrame {
        position: absolute; top: 50%; left: 50%;
        transform: translate(-50%, -60%);
        width: 260px; height: 260px;
      }
      .corner {
        position: absolute; width: 40px; height: 40px;
        border-color: #1ab861; border-style: solid;
      }
      .tl { top:0; left:0;   border-width: 4px 0 0 4px; }
      .tr { top:0; right:0;  border-width: 4px 4px 0 0; }
      .bl { bottom:0; left:0; border-width: 0 0 4px 4px; }
      .br { bottom:0; right:0; border-width: 0 4px 4px 0; }

      /* ── Scan line animation ── */
      #scanLine {
        position: absolute; top: 50%; left: 50%;
        transform: translate(-50%, -60%);
        width: 260px; height: 3px;
        background: linear-gradient(90deg, transparent, #1ab861, transparent);
        animation: scanMove 2s linear infinite; z-index: 998;
      }
      @keyframes scanMove {
        0%   { margin-top: -130px; opacity: 1; }
        100% { margin-top:  130px; opacity: 1; }
      }

      /* ── Result card — shown after inference ── */
      #resultCard {
        display: none;
        position: absolute; bottom: 120px; left: 50%;
        transform: translateX(-50%);
        background: rgba(0,0,0,0.88);
        color: white; padding: 18px 28px;
        border-radius: 18px; font-size: 16px;
        font-weight: bold; text-align: center;
        pointer-events: auto; min-width: 280px;
        max-width: 90vw;
      }
      #resultCard .label { font-size: 22px; margin-bottom: 8px; }
      #resultCard .details { font-size: 13px; font-weight: normal; color: #ccc; line-height: 1.6; }
      #resultCard .confidence-bar {
        margin-top: 10px; height: 8px;
        background: rgba(255,255,255,0.15); border-radius: 4px; overflow: hidden;
      }
      #resultCard .confidence-fill {
        height: 100%; border-radius: 4px;
        transition: width 0.5s ease;
      }

      /* ── Color themes per category ── */
      .theme-dry    { border: 2px solid #1ab861; }
      .theme-moist  { border: 2px solid #ff9900; }
      .theme-wet    { border: 2px solid #ff3333; }
      .fill-dry     { background: #1ab861; }
      .fill-moist   { background: #ff9900; }
      .fill-wet     { background: #ff3333; }

      /* ── Manual scan button ── */
      #scanBtn {
        display: none;
        position: absolute; bottom: 50px; left: 50%;
        transform: translateX(-50%);
        background: #1ab861; color: white;
        border: none; border-radius: 30px;
        padding: 14px 36px; font-size: 16px; font-weight: bold;
        cursor: pointer; pointer-events: auto;
        box-shadow: 0 4px 20px rgba(26,184,97,0.4);
      }
      #scanBtn:active { transform: translateX(-50%) scale(0.95); }

      /* ── Bottom hint ── */
      #hint {
        position: absolute; bottom: 20px; left: 50%;
        transform: translateX(-50%);
        color: rgba(255,255,255,0.55); font-size: 13px;
        text-align: center; pointer-events: none;
      }

      /* ── CSI Input panel (for testing / live data) ── */
      #csiPanel {
        display: none;
        position: absolute; top: 110px; right: 12px;
        background: rgba(0,0,0,0.75);
        color: #ccc; padding: 12px; border-radius: 12px;
        font-size: 11px; pointer-events: auto; max-width: 160px;
      }
      #csiPanel label { display: block; margin-bottom: 4px; }
      #csiPanel select {
        width: 100%; background: #222; color: white;
        border: 1px solid #444; border-radius: 6px; padding: 4px;
      }
      #debugToggle {
        position: absolute; top: 76px; right: 12px;
        background: rgba(0,0,0,0.6); color: #888;
        border: 1px solid #444; border-radius: 8px;
        padding: 5px 10px; font-size: 11px;
        cursor: pointer; pointer-events: auto; z-index: 1000;
      }

      /* ── Loading screen ── */
      #loadingScreen {
        position: fixed; top: 0; left: 0; width: 100%; height: 100%;
        background: #0a0a0f; display: flex; flex-direction: column;
        align-items: center; justify-content: center;
        z-index: 9999; color: white;
      }
      #loadingScreen h2 { color: #1ab861; font-size: 24px; margin-bottom: 12px; }
      #loadingScreen p  { color: #aaa; font-size: 14px; margin-bottom: 8px; }
      #loadingProgress  { color: #1ab861; font-size: 13px; margin-bottom: 24px; }
      .spinner {
        width: 50px; height: 50px;
        border: 4px solid rgba(26,184,97,0.2);
        border-top-color: #1ab861; border-radius: 50%;
        animation: spin 1s linear infinite;
      }
      @keyframes spin { to { transform: rotate(360deg); } }
    </style>
  </head>
  <body>

    <!-- ═══ Loading Screen ═══ -->
    <div id="loadingScreen">
      <h2>🔍 Seepage AR</h2>
      <p>Initializing camera &amp; loading models...</p>
      <div id="loadingProgress">Loading TensorFlow.js models...</div>
      <div class="spinner"></div>
    </div>

    <!-- ═══ AR Scene ═══ -->
    <a-scene
      embedded
      arjs="sourceType: webcam; debugUIEnabled: false; detectionMode: mono_and_matrix;"
      renderer="logarithmicDepthBuffer: true; precision: medium;"
      vr-mode-ui="enabled: false"
      loading-screen="enabled: false"
    >
      <!--
        HIRO MARKER → triggered when marker detected
        The 3D visuals update dynamically based on model inference result
      -->
      <a-marker preset="hiro" id="marker1">

        <!-- Dynamic sphere — color changes per result category -->
        <a-sphere
          id="resultSphere"
          position="0 0.5 0"
          radius="0.3"
          color="#888888"
          animation="property: position; to: 0 0.8 0; dur: 800; dir: alternate; loop: true; easing: easeInOutSine">
        </a-sphere>

        <!-- Dynamic label text -->
        <a-text
          id="resultText3D"
          value="SCANNING..."
          position="0 1.4 0"
          align="center"
          color="#ffffff"
          scale="0.8 0.8 0.8"
          animation="property: rotation; to: 0 360 0; dur: 4000; loop: true; easing: linear">
        </a-text>

        <!-- Confidence percentage text -->
        <a-text
          id="confidenceText3D"
          value=""
          position="0 1.0 0"
          align="center"
          color="#cccccc"
          scale="0.55 0.55 0.55">
        </a-text>

      </a-marker>

      <!-- Kanji marker — secondary detection point -->
      <a-marker preset="kanji" id="marker2">
        <a-box
          id="resultBox"
          position="0 0.5 0" scale="0.5 0.5 0.5" color="#888888"
          animation="property: rotation; to: 360 360 0; dur: 2000; loop: true; easing: linear">
        </a-box>
        <a-text
          id="resultText3D2"
          value="SCANNING..."
          position="0 1.2 0" align="center" color="#ffffff" scale="0.7 0.7 0.7">
        </a-text>
      </a-marker>

      <a-entity camera></a-entity>
    </a-scene>

    <!-- ═══ UI Overlay ═══ -->
    <div id="overlay">
      <div id="statusBar">📡 SCANNING FOR SEEPAGE...</div>
      <div id="modelStatus">⏳ Loading AI models...</div>

      <!-- Debug toggle (small button top-right) -->
      <button id="debugToggle" onclick="toggleCSIPanel()">🔧 Debug</button>

      <!-- CSI simulation panel (visible in debug mode) -->
      <div id="csiPanel">
        <label>Simulate CSI Data:</label>
        <select id="csiSimMode" onchange="onSimModeChange(this.value)">
          <option value="dry">Dry Wall</option>
          <option value="moist">Moderately Moist</option>
          <option value="wet">Wet / Seepage</option>
          <option value="random">Random (test)</option>
        </select>
        <br/>
        <button
          style="margin-top:8px; width:100%; background:#1ab861; color:white;
                 border:none; border-radius:6px; padding:6px; cursor:pointer;"
          onclick="runManualInference()">
          Run Inference
        </button>
      </div>

      <!-- Scan frame corners -->
      <div id="scanFrame">
        <div class="corner tl"></div>
        <div class="corner tr"></div>
        <div class="corner bl"></div>
        <div class="corner br"></div>
      </div>

      <!-- Scanning animation line -->
      <div id="scanLine"></div>

      <!-- Result card (shown after inference) -->
      <div id="resultCard">
        <div class="label" id="resultLabel">—</div>
        <div class="details" id="resultDetails">—</div>
        <div class="confidence-bar">
          <div class="confidence-fill" id="confidenceFill" style="width:0%"></div>
        </div>
      </div>

      <!-- Manual scan button (shown when marker visible) -->
      <button id="scanBtn" onclick="runManualInference()">🔍 Scan Now</button>

      <div id="hint">Point camera at Hiro marker to scan wall for seepage</div>
    </div>


    <!-- ═══════════════════════════════════════════════
         MAIN SCRIPT — Model Loading + Inference Logic
    ════════════════════════════════════════════════ -->
    <script>
    /*
    ╔══════════════════════════════════════════════════════════════╗
    ║  MODEL ARCHITECTURE (confirmed from your .h5 files)         ║
    ║                                                              ║
    ║  Both models take:  input shape = [1, 181, 1]               ║
    ║    → 181 CSI subcarrier amplitude values                     ║
    ║    → reshaped to (batch=1, timesteps=181, features=1)        ║
    ║                                                              ║
    ║  detection_model  → sigmoid output → 0.0–1.0                 ║
    ║    > 0.5  = seepage/moisture detected                        ║
    ║    ≤ 0.5  = dry/normal wall                                  ║
    ║                                                              ║
    ║  localization_model → 2 outputs:                            ║
    ║    output[0] = angle_output   (linear, degrees)             ║
    ║    output[1] = distance_output (linear, cm/m)               ║
    ║                                                              ║
    ╚══════════════════════════════════════════════════════════════╝

    HOW CSI DATA FLOWS IN (replace simulateCSI with real ESP32 data):

    Option A — Polling (ESP32 sends to your server):
      const response = await fetch('http://YOUR_ESP32_IP/csi');
      const json = await response.json();
      const csiValues = json.amplitudes; // array of 181 floats

    Option B — Unity sends CSI via URL parameter:
      const params = new URLSearchParams(window.location.search);
      const csiValues = JSON.parse(params.get('csi'));

    Option C — WebSocket from ESP32 directly:
      const ws = new WebSocket('ws://YOUR_ESP32_IP:81');
      ws.onmessage = (e) => { const csiValues = JSON.parse(e.data).amplitudes; }
    */

    // ────────────────────────────────────────────────
    // STEP 1: Configuration — edit paths if needed
    // ────────────────────────────────────────────────
    const CONFIG = {
      // Path to your tfjs model folders (relative to index.html)
      // After you upload to GitHub, these folders must be in the same repo:
      //   seepage-ar/
      //     index.html
      //     models/
      //       detection/model.json
      //       detection/group1-shard1of1.bin
      //       localization/model.json
      //       localization/group1-shard1of1.bin
      DETECTION_MODEL_URL:    './models/detection/model.json',
      LOCALIZATION_MODEL_URL: './models/localization/model.json',

      INPUT_SIZE: 181,          // Must match model input (confirmed from .h5)
      DETECTION_THRESHOLD: 0.5, // Sigmoid threshold: >0.5 = seepage detected
      AUTO_SCAN_INTERVAL: 3000, // ms between auto-scans when marker is visible
    };

    // ────────────────────────────────────────────────
    // STEP 2: Global state
    // ────────────────────────────────────────────────
    let detectionModel   = null;
    let localizationModel= null;
    let modelsLoaded     = false;
    let markerVisible    = false;
    let autoScanTimer    = null;
    let currentSimMode   = 'random'; // used in debug panel
    let lastResult       = null;

    // ────────────────────────────────────────────────
    // STEP 3: Load models
    // ────────────────────────────────────────────────
    async function loadModels() {
      const progress = document.getElementById('loadingProgress');
      try {
        progress.textContent = '⬇️ Loading detection model...';
        detectionModel = await tf.loadLayersModel(CONFIG.DETECTION_MODEL_URL);
        console.log('Detection model loaded:', detectionModel.inputShape);

        progress.textContent = '⬇️ Loading localization model...';
        localizationModel = await tf.loadLayersModel(CONFIG.LOCALIZATION_MODEL_URL);
        console.log('Localization model loaded:', localizationModel.inputShape);

        // Warm-up inference (prevents first-run lag)
        progress.textContent = '🔥 Warming up models...';
        const warmup = tf.zeros([1, CONFIG.INPUT_SIZE, 1]);
        const d = detectionModel.predict(warmup);
        const l = localizationModel.predict(warmup);
        tf.dispose([warmup, d, ...(Array.isArray(l) ? l : [l])]);

        modelsLoaded = true;
        progress.textContent = '✅ Models ready!';
        console.log('Both models warmed up and ready.');

        // Hide loading screen after short delay
        setTimeout(() => {
          document.getElementById('loadingScreen').style.display = 'none';
          updateModelStatus('✅ AI Models Loaded', '#1ab861');
        }, 800);

      } catch (err) {
        console.error('Model load error:', err);
        progress.textContent = '❌ Model load failed — check paths';
        progress.style.color = '#ff4444';

        // Still hide loading screen so AR is usable
        setTimeout(() => {
          document.getElementById('loadingScreen').style.display = 'none';
          updateModelStatus('⚠️ Models failed to load', '#ff9900');
        }, 2000);
      }
    }

    // ────────────────────────────────────────────────
    // STEP 4: CSI Data — Real vs Simulated
    // ────────────────────────────────────────────────

    /**
     * getCSIData()
     * ─────────────
     * THIS IS WHERE YOU PLUG IN YOUR REAL ESP32 CSI DATA.
     *
     * RIGHT NOW: returns simulated values for testing.
     * LATER:     replace the body with a real fetch/WebSocket call.
     *
     * Must return a Float32Array of exactly CONFIG.INPUT_SIZE (181) values.
     * Each value = CSI subcarrier amplitude (the same preprocessing
     * your friend used when training — typically normalized 0–1).
     */
    async function getCSIData() {
      // ── SIMULATION (for testing without ESP32) ──────────────────
      return simulateCSI(currentSimMode);

      // ── REAL ESP32 VIA HTTP (uncomment when ESP32 is ready) ──────
      // try {
      //   const res  = await fetch('http://192.168.x.x/csi', { signal: AbortSignal.timeout(2000) });
      //   const json = await res.json();
      //   const arr  = new Float32Array(json.amplitudes); // esp32 sends array of 181 floats
      //   return arr;
      // } catch (e) {
      //   console.warn('ESP32 fetch failed, using simulation:', e);
      //   return simulateCSI('random');
      // }

      // ── FROM UNITY URL PARAMETER (uncomment if Unity passes CSI) ─
      // const params = new URLSearchParams(window.location.search);
      // const csiStr = params.get('csi');
      // if (csiStr) return new Float32Array(JSON.parse(csiStr));
      // return simulateCSI('random');
    }

    /**
     * simulateCSI()
     * ─────────────
     * Generates realistic-looking CSI amplitude data per condition.
     * Replace entirely when real ESP32 data is available.
     */
    function simulateCSI(mode) {
      const data = new Float32Array(CONFIG.INPUT_SIZE);
      for (let i = 0; i < CONFIG.INPUT_SIZE; i++) {
        const base = Math.sin(i * 0.1) * 0.3 + Math.cos(i * 0.05) * 0.2;
        let noise, offset;
        switch (mode) {
          case 'dry':
            // Low variance, stable signal
            noise  = (Math.random() - 0.5) * 0.05;
            offset = 0.2;
            break;
          case 'moist':
            // Moderate variance
            noise  = (Math.random() - 0.5) * 0.15;
            offset = 0.5;
            break;
          case 'wet':
            // High variance, attenuated signal
            noise  = (Math.random() - 0.5) * 0.35;
            offset = 0.75;
            break;
          default: // random
            noise  = (Math.random() - 0.5) * 0.25;
            offset = Math.random() * 0.8;
        }
        data[i] = Math.min(1, Math.max(0, base + noise + offset));
      }
      return data;
    }

    // ────────────────────────────────────────────────
    // STEP 5: Run inference
    // ────────────────────────────────────────────────
    async function runInference() {
      if (!modelsLoaded) {
        console.warn('Models not loaded yet');
        return null;
      }

      let inputTensor = null;
      let detPred     = null;
      let locPreds    = null;

      try {
        // Get CSI data (181 values)
        const csiData = await getCSIData();

        // Reshape to [1, 181, 1] — batch=1, timesteps=181, features=1
        inputTensor = tf.tensor3d(csiData, [1, CONFIG.INPUT_SIZE, 1]);

        // ── Detection model ──────────────────────────────────────
        detPred = detectionModel.predict(inputTensor);
        const detScore = (await detPred.data())[0]; // sigmoid 0.0–1.0
        const isWet    = detScore > CONFIG.DETECTION_THRESHOLD;

        // ── Localization model ────────────────────────────────────
        // Returns array of 2 tensors: [angle_output, distance_output]
        locPreds = localizationModel.predict(inputTensor);
        const locTensors = Array.isArray(locPreds) ? locPreds : [locPreds];
        const angle    = (await locTensors[0].data())[0]; // degrees
        const distance = locTensors[1] ? (await locTensors[1].data())[0] : 0; // cm or m

        // Determine category (dry / moist / wet)
        let category, label, emoji;
        if (!isWet) {
          category = 'dry';
          label    = 'DRY WALL';
          emoji    = '✅';
        } else if (detScore < 0.75) {
          category = 'moist';
          label    = 'MOISTURE DETECTED';
          emoji    = '⚠️';
        } else {
          category = 'wet';
          label    = 'SEEPAGE DETECTED';
          emoji    = '🚨';
        }

        const result = {
          category,
          label,
          emoji,
          score:    detScore,         // 0.0–1.0 from sigmoid
          angle:    angle.toFixed(1), // e.g. 45.2 degrees
          distance: distance.toFixed(2), // e.g. 0.35 m
          confidence: Math.round(isWet ? detScore * 100 : (1 - detScore) * 100)
        };

        console.log('Inference result:', result);
        return result;

      } catch (err) {
        console.error('Inference error:', err);
        return null;
      } finally {
        // IMPORTANT: always dispose tensors to free GPU/WASM memory
        if (inputTensor) inputTensor.dispose();
        if (detPred)     detPred.dispose();
        if (locPreds) {
          const arr = Array.isArray(locPreds) ? locPreds : [locPreds];
          arr.forEach(t => t.dispose());
        }
      }
    }

    // ────────────────────────────────────────────────
    // STEP 6: Update all UI elements with result
    // ────────────────────────────────────────────────
    function updateUI(result) {
      if (!result) return;
      lastResult = result;

      const card    = document.getElementById('resultCard');
      const label   = document.getElementById('resultLabel');
      const details = document.getElementById('resultDetails');
      const fill    = document.getElementById('confidenceFill');
      const status  = document.getElementById('statusBar');

      // ── 2D overlay card ─────────────────────────────────────────
      card.style.display = 'block';
      card.className = `theme-${result.category}`;

      label.textContent = `${result.emoji} ${result.label}`;

      details.innerHTML =
        `Confidence: ${result.confidence}%<br>` +
        `Detection score: ${(result.score * 100).toFixed(1)}%<br>` +
        (result.category !== 'dry'
          ? `Estimated angle: ${result.angle}°<br>Estimated distance: ${result.distance} m`
          : 'Wall condition: Normal');

      fill.style.width     = result.confidence + '%';
      fill.className       = `confidence-fill fill-${result.category}`;

      // ── Status bar ──────────────────────────────────────────────
      const colors = { dry: '#1ab861', moist: '#ff9900', wet: '#ff3333' };
      status.style.color       = colors[result.category];
      status.style.borderColor = colors[result.category];
      status.innerHTML =
        result.category === 'dry'
          ? '✅ WALL IS DRY — No Seepage'
          : `${result.emoji} ${result.label}!`;

      // ── 3D AR marker elements ────────────────────────────────────
      const sphereColors = { dry: '#1ab861', moist: '#ff9900', wet: '#ff2222' };
      const sphere = document.getElementById('resultSphere');
      const text3d = document.getElementById('resultText3D');
      const conf3d = document.getElementById('confidenceText3D');
      const box2   = document.getElementById('resultBox');
      const text2  = document.getElementById('resultText3D2');

      if (sphere) sphere.setAttribute('color', sphereColors[result.category]);
      if (text3d) text3d.setAttribute('value', result.label);
      if (conf3d) conf3d.setAttribute('value', `${result.confidence}% confidence`);
      if (box2)   box2.setAttribute('color', sphereColors[result.category]);
      if (text2)  text2.setAttribute('value', result.label);
    }

    // ────────────────────────────────────────────────
    // STEP 7: Manual scan button
    // ────────────────────────────────────────────────
    async function runManualInference() {
      const btn = document.getElementById('scanBtn');
      if (btn) { btn.disabled = true; btn.textContent = '⏳ Scanning...'; }

      const result = await runInference();
      if (result) updateUI(result);

      if (btn) { btn.disabled = false; btn.textContent = '🔍 Scan Now'; }
    }

    // ────────────────────────────────────────────────
    // STEP 8: Marker detection events + auto-scan
    // ────────────────────────────────────────────────
    function setupMarkerEvents() {
      const marker1 = document.querySelector('#marker1');
      const marker2 = document.querySelector('#marker2');
      const scanBtn = document.getElementById('scanBtn');

      if (marker1) {
        marker1.addEventListener('markerFound', async () => {
          markerVisible = true;
          if (scanBtn) scanBtn.style.display = 'block';
          updateModelStatus('📍 Marker detected — scanning...', '#1ab861');

          // Run initial inference immediately
          const result = await runInference();
          if (result) updateUI(result);

          // Auto-scan every N seconds while marker visible
          if (modelsLoaded) {
            autoScanTimer = setInterval(async () => {
              if (!markerVisible) return;
              const r = await runInference();
              if (r) updateUI(r);
            }, CONFIG.AUTO_SCAN_INTERVAL);
          }
        });

        marker1.addEventListener('markerLost', () => {
          markerVisible = false;
          if (scanBtn) scanBtn.style.display = 'none';
          if (autoScanTimer) { clearInterval(autoScanTimer); autoScanTimer = null; }

          // Reset status bar (keep result card visible)
          const status = document.getElementById('statusBar');
          status.style.color       = '#1ab861';
          status.style.borderColor = '#1ab861';
          status.innerHTML = '📡 SCANNING FOR SEEPAGE...';
          updateModelStatus(modelsLoaded ? '✅ AI Models Loaded' : '⏳ Loading...', '#1ab861');
        });
      }

      if (marker2) {
        marker2.addEventListener('markerFound', async () => {
          const result = await runInference();
          if (result) updateUI(result);
        });
      }
    }

    // ────────────────────────────────────────────────
    // STEP 9: Helpers
    // ────────────────────────────────────────────────
    function updateModelStatus(msg, color) {
      const el = document.getElementById('modelStatus');
      if (el) { el.textContent = msg; el.style.color = color || '#aaa'; }
    }

    function toggleCSIPanel() {
      const p = document.getElementById('csiPanel');
      p.style.display = p.style.display === 'none' ? 'block' : 'none';
    }

    function onSimModeChange(val) { currentSimMode = val; }

    // Camera access
    document.addEventListener('DOMContentLoaded', () => {
      if (!navigator.mediaDevices) navigator.mediaDevices = {};
      if (!navigator.mediaDevices.getUserMedia) {
        navigator.mediaDevices.getUserMedia = (constraints) => {
          const fn = navigator.webkitGetUserMedia || navigator.mozGetUserMedia;
          if (!fn) return Promise.reject(new Error('getUserMedia not supported'));
          return new Promise((res, rej) => fn.call(navigator, constraints, res, rej));
        };
      }
      navigator.mediaDevices.getUserMedia({
        video: { facingMode: { ideal: 'environment' }, width: { ideal: 1280 }, height: { ideal: 720 } }
      }).then(() => console.log('Camera OK')).catch(e => console.error('Camera error:', e));
    });

    // ────────────────────────────────────────────────
    // BOOT
    // ────────────────────────────────────────────────
    window.addEventListener('load', () => {
      // Start loading models immediately
      loadModels();

      // Wait for A-Frame scene to be ready, then set up marker events
      const scene = document.querySelector('a-scene');
      if (scene.hasLoaded) {
        setupMarkerEvents();
      } else {
        scene.addEventListener('loaded', setupMarkerEvents);
      }
    });
    </script>

  </body>
</html>
