<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, user-scalable=no"
    />
    <title>Seepage AR Scanner</title>

    <!-- AR.js + A-Frame -->
    <script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>

    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      body {
        overflow: hidden;
        background: #000;
        font-family: Arial, sans-serif;
      }

      /* Overlay UI on top of AR camera */
      #overlay {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        pointer-events: none;
        z-index: 999;
      }

      /* Top status bar */
      #statusBar {
        position: absolute;
        top: 20px;
        left: 50%;
        transform: translateX(-50%);
        background: rgba(0, 0, 0, 0.7);
        color: #1ab861;
        padding: 10px 24px;
        border-radius: 30px;
        font-size: 16px;
        font-weight: bold;
        border: 1px solid #1ab861;
        text-align: center;
        pointer-events: none;
      }

      /* Scan frame corners */
      #scanFrame {
        position: absolute;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -60%);
        width: 260px;
        height: 260px;
      }
      .corner {
        position: absolute;
        width: 40px;
        height: 40px;
        border-color: #1ab861;
        border-style: solid;
      }
      .tl {
        top: 0;
        left: 0;
        border-width: 4px 0 0 4px;
      }
      .tr {
        top: 0;
        right: 0;
        border-width: 4px 4px 0 0;
      }
      .bl {
        bottom: 0;
        left: 0;
        border-width: 0 0 4px 4px;
      }
      .br {
        bottom: 0;
        right: 0;
        border-width: 0 4px 4px 0;
      }

      /* Scanning animation line */
      #scanLine {
        position: absolute;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -60%);
        width: 260px;
        height: 3px;
        background: linear-gradient(90deg, transparent, #1ab861, transparent);
        animation: scanMove 2s linear infinite;
        z-index: 998;
      }
      @keyframes scanMove {
        0% {
          margin-top: -130px;
          opacity: 1;
        }
        100% {
          margin-top: 130px;
          opacity: 1;
        }
      }

      /* Leak detected alert */
      #leakAlert {
        display: none;
        position: absolute;
        bottom: 120px;
        left: 50%;
        transform: translateX(-50%);
        background: rgba(180, 20, 20, 0.92);
        color: white;
        padding: 16px 32px;
        border-radius: 16px;
        font-size: 20px;
        font-weight: bold;
        text-align: center;
        pointer-events: auto;
        border: 2px solid #ff4444;
      }

      /* Bottom hint */
      #hint {
        position: absolute;
        bottom: 40px;
        left: 50%;
        transform: translateX(-50%);
        color: rgba(255, 255, 255, 0.7);
        font-size: 14px;
        text-align: center;
        pointer-events: none;
      }

      /* Loading screen */
      #loadingScreen {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: #0a0a0f;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        z-index: 9999;
        color: white;
      }
      #loadingScreen h2 {
        color: #1ab861;
        font-size: 24px;
        margin-bottom: 12px;
      }
      #loadingScreen p {
        color: #aaa;
        font-size: 14px;
        margin-bottom: 30px;
      }
      .spinner {
        width: 50px;
        height: 50px;
        border: 4px solid rgba(26, 184, 97, 0.2);
        border-top-color: #1ab861;
        border-radius: 50%;
        animation: spin 1s linear infinite;
      }
      @keyframes spin {
        to {
          transform: rotate(360deg);
        }
      }
    </style>
  </head>
  <body>
    <!-- Loading Screen -->
    <div id="loadingScreen">
      <h2>🔍 Seepage AR</h2>
      <p>Initializing camera...</p>
      <div class="spinner"></div>
    </div>

    <!-- AR Scene — camera background is automatic -->
    <a-scene
      embedded
      arjs="sourceType: webcam; debugUIEnabled: false; detectionMode: mono_and_matrix;"
      renderer="logarithmicDepthBuffer: true; precision: medium;"
      vr-mode-ui="enabled: false"
      loading-screen="enabled: false"
    >
      <!-- Hiro marker — point camera at printed Hiro marker -->
      <a-marker preset="hiro" id="marker1">
        <!-- Red sphere = leak indicator -->
        <a-sphere
          position="0 0.5 0"
          radius="0.3"
          color="#ff2222"
          animation="property: position; to: 0 0.8 0; dur: 800; dir: alternate; loop: true; easing: easeInOutSine"
        >
        </a-sphere>
        <a-text
          value="LEAK DETECTED"
          position="0 1.4 0"
          align="center"
          color="#ff4444"
          scale="0.8 0.8 0.8"
          animation="property: rotation; to: 0 360 0; dur: 4000; loop: true; easing: linear"
        >
        </a-text>
      </a-marker>

      <!-- Kanji marker — second detection point -->
      <a-marker preset="kanji">
        <a-box
          position="0 0.5 0"
          scale="0.5 0.5 0.5"
          color="#ff6600"
          animation="property: rotation; to: 360 360 0; dur: 2000; loop: true; easing: linear"
        >
        </a-box>
        <a-text
          value="MOISTURE DETECTED"
          position="0 1.2 0"
          align="center"
          color="#ff8800"
          scale="0.7 0.7 0.7"
        >
        </a-text>
      </a-marker>

      <a-entity camera></a-entity>
    </a-scene>

    <!-- UI Overlay -->
    <div id="overlay">
      <div id="statusBar">📡 SCANNING FOR SEEPAGE...</div>

      <!-- Scan frame corners -->
      <div id="scanFrame">
        <div class="corner tl"></div>
        <div class="corner tr"></div>
        <div class="corner bl"></div>
        <div class="corner br"></div>
      </div>

      <!-- Scan line animation -->
      <div id="scanLine"></div>

      <!-- Leak alert (shown when marker detected) -->
      <div id="leakAlert">
        ⚠️ LEAK DETECTED!<br />
        <span style="font-size: 14px; font-weight: normal"
          >Moisture found in scanned area</span
        >
      </div>

      <div id="hint">Point camera at wall to scan for seepage</div>
    </div>

    <script>
      // Force HTTPS camera access for WebView
      document.addEventListener("DOMContentLoaded", function () {
        // Override getUserMedia for WebView compatibility
        if (!navigator.mediaDevices) {
          navigator.mediaDevices = {};
        }

        if (!navigator.mediaDevices.getUserMedia) {
          navigator.mediaDevices.getUserMedia = function (constraints) {
            var getUserMedia =
              navigator.webkitGetUserMedia ||
              navigator.mozGetUserMedia ||
              navigator.msGetUserMedia;

            if (!getUserMedia) {
              return Promise.reject(new Error("getUserMedia not supported"));
            }

            return new Promise(function (resolve, reject) {
              getUserMedia.call(navigator, constraints, resolve, reject);
            });
          };
        }

        // Request rear camera immediately
        navigator.mediaDevices
          .getUserMedia({
            video: {
              facingMode: { ideal: "environment" },
              width: { ideal: 1280 },
              height: { ideal: 720 },
            },
          })
          .then(function (stream) {
            console.log("Camera access granted!");
          })
          .catch(function (err) {
            console.error("Camera error: " + err.message);
          });
      });
    </script>
  </body>
</html>
